<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopify Order Assist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [hidden] {
      display: none !important;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .auth-screen {
      width: 100%;
      max-width: 400px;
      padding: 16px;
    }

    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 24px;
    }

    .auth-card h2 {
      font-size: 20px;
      margin-bottom: 16px;
      text-align: center;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      cursor: pointer;
      font-size: 14px;
    }

    .auth-tab.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .auth-error {
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .auth-card form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .auth-card input {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    .auth-card button[type="submit"] {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
    }

    .auth-card button[type="submit"]:hover {
      background: #1d4ed8;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 980px;
      height: 100vh;
      max-height: 780px;
      display: flex;
      flex-direction: row;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .chat-sidebar {
      width: 270px;
      border-right: 1px solid #e2e8f0;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 14px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      cursor: pointer;
    }

    .chat-item.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .chat-item-title {
      font-size: 13px;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-time {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      background: #2563eb;
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      background: #fff;
      color: #2563eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .chat-header h1 { font-size: 16px; font-weight: 600; }
    .chat-header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #userEmail {
      font-size: 11px;
      opacity: 0.9;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #logoutBtn {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    #logoutBtn:hover { background: rgba(255,255,255,0.3); }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
    }

    #newChatBtn {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #newChatBtn:hover { background: rgba(255,255,255,0.3); }

    .tool-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .tool-badge {
      font-size: 11px;
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 2px 8px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.agent .bubble h1,
    .message.agent .bubble h2,
    .message.agent .bubble h3 {
      margin: 0 0 8px;
      line-height: 1.3;
    }

    .message.agent .bubble h1 { font-size: 18px; }
    .message.agent .bubble h2 { font-size: 16px; }
    .message.agent .bubble h3 { font-size: 15px; }

    .message.agent .bubble ul {
      margin: 6px 0 6px 18px;
      padding: 0;
    }

    .message.agent .bubble li { margin: 2px 0; }

    .message.agent .bubble code {
      background: #e2e8f0;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .message.agent .bubble pre {
      margin: 8px 0;
      background: #0f172a;
      color: #e2e8f0;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre;
    }

    .message.agent .bubble pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      font-size: 12px;
    }

    .message.agent .bubble a {
      color: #1d4ed8;
      text-decoration: underline;
    }

    .message.user .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: #f1f5f9;
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
      padding: 0 4px;
    }

    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .suggestions {
      padding: 8px 16px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .chip:hover { background: #dbeafe; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
    }

    #userInput {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    #userInput:focus { border-color: #2563eb; }

    #sendBtn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #sendBtn:hover { background: #1d4ed8; }
    #sendBtn:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h2>Shopify Order Assist</h2>
      <div class="auth-tabs">
        <button type="button" id="tabLogin" class="auth-tab active">Login</button>
        <button type="button" id="tabRegister" class="auth-tab">Register</button>
      </div>
      <p id="authError" class="auth-error" hidden></p>
      <form id="loginForm">
        <input id="loginEmail" type="email" autocomplete="username" placeholder="Email" required />
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password" required />
        <button type="submit">Sign in</button>
      </form>
      <form id="registerForm" hidden>
        <input id="registerEmail" type="email" autocomplete="email" placeholder="Email" required />
        <input id="registerPassword" type="password" autocomplete="new-password" placeholder="Password" required />
        <button type="submit">Create account</button>
      </form>
    </div>
  </div>

  <div id="chatScreen" class="chat-wrapper" hidden>
    <aside class="chat-sidebar">
      <div class="sidebar-header">Chats</div>
      <div class="chat-list" id="chatList"></div>
    </aside>

    <main class="chat-main">
      <div class="chat-header">
        <div class="avatar">SE</div>
        <div>
          <h1>Shopify Order Assist</h1>
          <p>AI-powered customer assistant</p>
        </div>
        <div class="header-right">
          <div class="status-dot"></div>
          <span id="userEmail"></span>
          <button type="button" id="logoutBtn">Log out</button>
          <button type="button" id="newChatBtn">+ New Chat</button>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="message agent">
          <div class="bubble">Hi! I'm Shopify Order Assist. I can help you track orders, answer questions about policies, or connect you with support. How can I help you today?</div>
          <span class="message-time">Just now</span>
        </div>
      </div>

      <div class="suggestions" id="suggestions">
        <button type="button" class="chip" onclick="sendSuggestion('What orders do I have?')">My orders</button>
        <button type="button" class="chip" onclick="sendSuggestion('What is your return policy?')">Return policy</button>
        <button type="button" class="chip" onclick="sendSuggestion('I need to speak with a human')">Human help</button>
      </div>

      <div class="input-area">
        <input id="userInput" type="text" placeholder="Type your message" autocomplete="off" />
        <button type="button" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
